<h1 style="text-align:center;">Confirm Crops You Will Grow</h1>

<form action="confirm_crop.php" method="POST" class="farm-form">

<div id="confirmCropContainer">

<div class="crop-row">

<select name="crop_name[]">
<option>Tomato</option>
<option>Onion</option>
<option>Potato</option>
<option>Chilli</option>
<option>Rice</option>
<option>Wheat</option>
<option>Maize</option>
<option>Groundnut</option>
<option>Millet</option>
<option>Soybean</option>
<option>Cotton</option>
<option>Sugarcane</option>
</select>

<input type="number" name="production[]" placeholder="Production (kg)" required>

</div>

</div>

<br>

<button type="button" onclick="addCrop()">Add Another Crop</button>

<br><br>

<button type="submit" class="submit-btn">Confirm Crops</button>

</form>


<script>

let cropCount = 1;

function addCrop(){

if(cropCount >= 12){
alert("Maximum 12 crops allowed");
return;
}

cropCount++;

let container = document.getElementById("confirmCropContainer");

let div = document.createElement("div");
div.className="crop-row";

div.innerHTML = `
<select name="crop_name[]">
<option>Tomato</option>
<option>Onion</option>
<option>Potato</option>
<option>Chilli</option>
<option>Rice</option>
<option>Wheat</option>
<option>Maize</option>
<option>Groundnut</option>
<option>Millet</option>
<option>Soybean</option>
<option>Cotton</option>
<option>Sugarcane</option>
</select>

<input type="number" name="production[]" placeholder="Production (kg)" required>
`;

container.appendChild(div);

}

</script>

</body>
