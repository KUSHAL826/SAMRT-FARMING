<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">

<div class="logo">
<img src="logo.png">
<span>GNA SMART FARMING</span>
</div>

<nav>
<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="farmer-dashboard.html">Farmer</a></li>
<li><a href="#">Admin</a></li>
<li><a href="about.html">About Us</a></li>
</ul>
</nav>

</header>


<div class="dashboard-container">

<h1>Smart Crop Advisory System</h1>

<form action="save_farmer.php" method="POST" class="farm-form">

<h2>Farmer Details</h2>

<div class="form-grid">

<div class="form-group">
<label>Farmer Name</label>
<input type="text" name="farmer_name" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" name="phone" required>
</div>

<div class="form-group">
<label>Address</label>
<input type="text" name="address" required>
</div>

<div class="form-group">
<label>Land Details</label>
<input type="text" name="land_details" placeholder="Example: 2 acres" required>
</div>

<div class="form-group">
<label>Soil Type</label>
<select name="soil_type">
<option>Loamy</option>
<option>Black</option>
<option>Sandy</option>
<option>Red</option>
</select>
</div>

<div class="form-group">
<label>Water Availability</label>
<select name="water_availability">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

<div class="form-group">
<label>Season</label>
<select name="season">
<option>Summer</option>
<option>Winter</option>
<option>Monsoon</option>
</select>
</div>

</div>


<h2>Select Crops of Interest</h2>

<div id="cropContainer">

<div class="crop-row">

<select name="crop_name[]">
<option>Tomato</option>
<option>Onion</option>
<option>Potato</option>
<option>Chilli</option>
<option>Rice</option>
<option>Wheat</option>
<option>Maize</option>
<option>Groundnut</option>
<option>Millet</option>
<option>Soybean</option>
<option>Cotton</option>
<option>Sugarcane</option>
</select>

<input type="number" name="expected_production[]" placeholder="Production (kg)" required>

</div>

</div>

<button type="button" class="add-btn" onclick="addCrop()">Add Another Crop</button>


<div class="form-group">

</div>

<br>

<button type="submit" class="submit-btn">Check Suitability</button>

</form>

</div>


<script>

let cropCount = 1;

function addCrop(){

if(cropCount >= 12){
alert("Maximum 12 crops allowed");
return;
}

cropCount++;

let container = document.getElementById("cropContainer");

let div = document.createElement("div");
div.className="crop-row";

div.innerHTML = `
<select name="crop_name[]">
<option>Tomato</option>
<option>Onion</option>
<option>Potato</option>
<option>Chilli</option>
<option>Rice</option>
<option>Wheat</option>
<option>Maize</option>
<option>Groundnut</option>
<option>Millet</option>
<option>Soybean</option>
<option>Cotton</option>
<option>Sugarcane</option>
</select>

<input type="number" name="expected_production[]" placeholder="Production (kg)" required>
`;

container.appendChild(div);

}

</script>

</body>
</html>
